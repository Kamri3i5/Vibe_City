name: Update Afisha events

on:
  schedule:
    # Каждые 6 часов — живые события без бэкенда
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch events from Afisha.uz RSS
        run: node scripts/fetch-afisha.mjs

      - name: Commit updated data
        run: |
          git config user.name "vibecity-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/afisha.json
          git diff --cached --quiet || git commit -m "chore: update afisha events"
          git push
